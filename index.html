<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Café Coffee Streak</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: #f6f3ee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #4b3b2a;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        .description {
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: #8b5e3c;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .streak-text {
            font-weight: bold;
            margin-bottom: 8px;
        }
        .ascii-bar {
            font-family: monospace;
            margin-bottom: 12px;
        }
        hr {
            border: 0.5px solid #ddd;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>☕ The Café is Open</h3>
        <div class="description">𝒯𝒽𝑒 𝒶𝒾𝓇 𝓈𝓂𝑒𝓁𝓁𝓈 𝓁𝒾𝓀𝑒 𝓋𝒶𝓃𝒾𝓁𝓁𝒶 𝒶𝓃𝒹 𝒸𝑒𝒹𝒶𝓇𝓌𝑜𝑜𝒹.</div>

        <div class="streak-text">🌿 Current streak: <span id="streak">0</span> days</div>
        <div class="ascii-bar" id="ascii-bar">☕ Progress: █░░░░░</div>

        <button onclick="brewCoffee()">☕ Brew Today's Coffee</button>
        <hr>
        <div class="description">𝘉𝘳𝘦𝘸 𝘵𝘰𝘥𝘢𝘺’𝘴 𝘤𝘶𝘱 𝘣𝘦𝘧𝘰𝘳𝘦 𝘵𝘩𝘦 𝘭𝘪𝘨𝘩𝘵 𝘧𝘢𝘥𝘦𝘴.</div>
    </div>

<script>
    const SUPABASE_URL = "https://obqytmrdesfiajdstymp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_F5OFgkuHRXo17oA3VRvnsQ_YfCeJ_Dv";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getAsciiBar(streak) {
        const total = 7;
        const filled = "█".repeat(streak % total);
        const empty = "░".repeat(total - (streak % total));
        return filled + empty;
    }

    function isToday(dateString) {
        if (!dateString) return false;
        const last = new Date(dateString);
        const today = new Date();
        return last.getFullYear() === today.getFullYear() &&
                     last.getMonth() === today.getMonth() &&
                     last.getDate() === today.getDate();
    }

    async function loadData() {
        const { data, error } = await supabase.from('cafe_stats').select('*').limit(1);
        if (error) return console.error('Error fetching streak:', error);

        if (data && data.length > 0) {
            let streak = data[0].streak;
            const lastBrew = data[0].last_brew;

            // Reset streak if last brew wasn't today
            if (!isToday(lastBrew)) {
                streak = 0;
                await supabase.from('cafe_stats').update({ streak }).eq('id', data[0].id);
            }

            document.getElementById('streak').innerText = streak;
            document.getElementById('ascii-bar').innerText = `☕ Progress: ${getAsciiBar(streak)}`;
        }
    }

    async function brewCoffee() {
        const { data, error } = await supabase.from('cafe_stats').select('*').limit(1);
        if (error) return console.error('Error fetching streak:', error);

        if (data && data.length > 0) {
            let streak = data[0].streak;
            const lastBrew = data[0].last_brew;

            if (!isToday(lastBrew)) streak = 0;

            streak += 1;
            await supabase.from('cafe_stats').update({ streak, last_brew: new Date().toISOString() }).eq('id', data[0].id);
            loadData();
        }
    }

    loadData();
</script>
</body>
</html>
